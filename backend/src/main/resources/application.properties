# Application
spring.application.name=workly-backend
server.port=8080

# H2 Database (dev mode)
spring.datasource.url=jdbc:h2:mem:worklydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
jwt.secret=workly-super-secret-key-2024-jwt-authentication-spring-boot-angular
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:4200

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
